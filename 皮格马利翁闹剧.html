<div class="text-card">
人物关系: 庸人学者&天才造物 | 圣人私心&假人空心<br>
核心:天才的造物、无知无心的蝴蝶，被三千万世的轮回训练依旧懵懂。非人非神,徒劳的燃烧自我。作为【好心人】的维里塔斯·拉帝奥把她从那片忆质中打捞出来。或许是出于研究精神,好奇数据成为有形体但无*心*的生命是如何存在。他塑造她,引导她,暗示她应该是如何的存在。可最后还是以闹剧结尾,她难以区分她想要的是自我生命的本能,还是无趣的时刻锚定。
</div>
